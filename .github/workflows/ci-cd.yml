name: Flask CI/CD Pipeline

on:
  push:
    branches:
      - staging
      - main

jobs:

  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - run: |
          pip install -r requirements.txt
          pytest -v
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}


  deploy-staging:
    needs: build-test
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy STAGING
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ec2-user
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            echo "🚀 STAGING DEPLOY"

            cd /home/ec2-user/staging-app || exit 1

            git fetch origin
            git checkout staging
            git reset --hard origin/staging

            pip3 install -r requirements.txt

            pkill -f "app.py --port 5001" || true
            nohup python3 app.py --port 5001 > staging.log 2>&1 &

            echo "✅ STAGING DONE"


  deploy-production:
    needs: build-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy PROD
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ec2-user
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            echo "🚀 PROD DEPLOY"

            cd /home/ec2-user/prod-app || exit 1

            git fetch origin
            git checkout main
            git reset --hard origin/main

            pip3 install -r requirements.txt

            pkill -f "app.py --port 5000" || true
            nohup python3 app.py --port 5000 > prod.log 2>&1 &

            echo "✅ PROD DONE"
