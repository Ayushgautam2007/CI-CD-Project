name: Flask CI/CD Pipeline

on:
  push:
    branches:
      - staging
      - main

jobs:

  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: pytest -v


  deploy-staging:
    name: Deploy to Staging
    needs: build-test
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Staging EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ec2-user
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            echo "🚀 STAGING DEPLOYMENT START"

            cd /home/ec2-user/CI-CD-Project

            git config --global --add safe.directory /home/ec2-user/CI-CD-Project

            git fetch origin
            git checkout staging
            git pull origin staging

            pip3 install -r requirements.txt

            pkill -f "python3 app.py" || true

            nohup python3 app.py > app.log 2>&1 < /dev/null & disown

            echo "✅ STAGING DEPLOYED SUCCESSFULLY"


  deploy-production:
    name: Deploy to Production
    needs: build-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Production EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ec2-user
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            echo "🚀 PRODUCTION DEPLOYMENT START"

            cd /home/ec2-user/CI-CD-Project

            git config --global --add safe.directory /home/ec2-user/CI-CD-Project

            git fetch origin
            git checkout main
            git pull origin main

            pip3 install -r requirements.txt

            pkill -f "python3 app.py" || true

            nohup python3 app.py > app.log 2>&1 < /dev/null & disown

            echo "✅ PRODUCTION DEPLOYED SUCCESSFULLY"
