name: Flask CI/CD Pipeline

on:
  push:
    branches:
      - main
      - staging

  release:
    types:
      - published

jobs:
  build-test:
    name: Build and Test
    runs-on: ubuntu-latest

    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Environment Variables
        run: |
          if [ -z "$MONGO_URI" ]; then
            echo "ERROR: MONGO_URI secret is not configured!"
            exit 1
          fi

          if [ -z "$SECRET_KEY" ]; then
            echo "ERROR: SECRET_KEY secret is not configured!"
            exit 1
          fi

          echo "Environment variables loaded successfully."

      - name: Run Unit Tests
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: |
          pytest -v

      - name: Build Application
        run: |
          echo "Preparing application for deployment..."
          mkdir -p build
          cp app.py build/
          cp requirements.txt build/
          cp start_flask.sh build/
          cp -r templates build/
          echo "Build completed successfully."

  deploy-staging:
    name: Deploy to Staging
    needs: build-test
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest

    env:
      STAGING_HOST: ${{ secrets.STAGING_HOST }}
      STAGING_USER: ${{ secrets.STAGING_USER }}
      API_TOKEN: ${{ secrets.API_TOKEN }}
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to Staging
        run: |
          echo "Deploying to Staging..."
          echo "Host: $STAGING_HOST"
          echo "User: $STAGING_USER"
          echo "Deployment completed successfully."

  deploy-production:
    name: Deploy to Production
    needs: build-test
    if: github.event_name == 'release'
    runs-on: ubuntu-latest

    env:
      PROD_HOST: ${{ secrets.PROD_HOST }}
      PROD_USER: ${{ secrets.PROD_USER }}
      PROD_API_TOKEN: ${{ secrets.PROD_API_TOKEN }}
      PROD_DEPLOY_KEY: ${{ secrets.PROD_DEPLOY_KEY }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to Production
        run: |
          echo "Deploying to Production..."
          echo "Host: $PROD_HOST"
          echo "User: $PROD_USER"
          echo "Production deployment completed successfully."
